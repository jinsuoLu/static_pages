<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车状态查询及离场系统 - 微信提醒版</title>
    <!-- 引入本地二维码生成库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <style>
        :root {
            --primary: #3498db;
            --primary-hover: #2980b9;
            --primary-light: #e8f4fd;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --success: #27ae60;
            --success-hover: #219a52;
            --warning: #f39c12;
            --warning-hover: #e67e22;
            --bg-start: #f5f7fa;
            --bg-end: #c3cfe2;
            --card-bg: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #495057;
            --text-muted: #6c757d;
            --border: #e0e0e0;
            --border-focus: #3498db;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.2);
            --radius-sm: 6px;
            --radius: 8px;
            --radius-lg: 12px;
            --radius-xl: 15px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            transition: all var(--transition);
        }

        h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 30px;
            font-size: 28px;
            letter-spacing: 0.02em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
            font-size: 16px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            font-size: 16px;
            box-sizing: border-box;
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: 0.04em;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            cursor: pointer;
            transition: all var(--transition);
            margin-bottom: 15px;
            font-family: inherit;
            letter-spacing: 0.03em;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        button:hover {
            background: linear-gradient(135deg, var(--primary-hover) 0%, #2573a7 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        button:active {
            transform: scale(0.97);
            transition: transform 0.1s;
        }

        button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .leave-btn {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-hover) 100%);
        }

        .leave-btn:hover {
            background: linear-gradient(135deg, var(--danger-hover) 0%, #a93226 100%);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        /* 定时查询控制区域 */
        .timer-control-panel {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
        }

        .timer-control-panel .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 130px;
        }

        .timer-control-panel .control-group label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0;
            letter-spacing: 0.03em;
        }

        .timer-control-panel .control-group input {
            padding: 10px 12px;
            border: 2px solid #dde4ed;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            height: 42px;
            background: #fff;
        }

        .timer-control-panel .control-group input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 6px rgba(52, 152, 219, 0.15);
        }

        .timer-control-panel .control-group .input-suffix {
            position: relative;
        }

        .timer-control-panel .control-group .input-suffix::after {
            content: '分钟';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            color: var(--text-muted);
            pointer-events: none;
        }

        .timer-control-panel .control-group .input-suffix input {
            padding-right: 52px;
        }

        .timer-btn {
            width: auto !important;
            height: 42px;
            padding: 0 18px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            white-space: nowrap;
            margin-bottom: 0 !important;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .timer-btn-start {
            background: linear-gradient(135deg, var(--success) 0%, var(--success-hover) 100%);
            color: #fff;
        }

        .timer-btn-start:hover {
            background: linear-gradient(135deg, var(--success-hover) 0%, #1e8449 100%);
            box-shadow: 0 4px 14px rgba(39, 174, 96, 0.35);
        }

        .timer-btn-stop {
            background: linear-gradient(135deg, var(--danger) 0%, var(--danger-hover) 100%);
            color: #fff;
        }

        .timer-btn-stop:hover {
            background: linear-gradient(135deg, var(--danger-hover) 0%, #a93226 100%);
            box-shadow: 0 4px 14px rgba(231, 76, 60, 0.35);
        }

        .timer-status {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            margin-left: auto;
            white-space: nowrap;
        }

        .timer-status.running {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .timer-status.stopped {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .timer-status .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .timer-status.running .status-dot {
            background: #27ae60;
        }

        .timer-status.stopped .status-dot {
            background: #e74c3c;
            animation: none;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.3);
            }
        }

        .countdown-info {
            font-size: 0.78rem;
            color: var(--text-muted);
            letter-spacing: 0.02em;
            margin-top: 4px;
        }

        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--radius);
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(14px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes qrPopIn {
            0% {
                opacity: 0;
                transform: scale(0.7);
            }
            60% {
                opacity: 1;
                transform: scale(1.04);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .parking-info {
            margin-top: 15px;
        }

        .info-item {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: var(--radius-sm);
        }

        .info-label {
            font-weight: bold;
            color: var(--text-secondary);
        }

        .info-value {
            color: #212529;
        }

        .highlight {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            padding: 15px;
            border-radius: var(--radius-sm);
            margin: 10px 0;
        }

        /* 超时提醒状态指示 */
        .overtime-alert {
            background: #fff5f5;
            border: 2px solid #fc8181;
            border-radius: var(--radius);
            padding: 14px;
            margin: 12px 0;
            display: none;
            animation: fadeInUp 0.4s ease-out;
        }

        .overtime-alert.visible {
            display: block;
        }

        .overtime-alert .alert-title {
            font-weight: 700;
            color: #c53030;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .overtime-alert .alert-detail {
            font-size: 0.82rem;
            color: #742a2a;
            letter-spacing: 0.02em;
        }

        .qrcode-container {
            text-align: center;
            margin-top: 20px;
            display: none;
            animation: fadeInUp 0.5s ease-out;
            background: #fafbfc;
            border: 1px solid #e8ecf0;
            border-radius: var(--radius-lg);
            padding: 20px 16px 16px;
        }

        .qrcode-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 700;
        }

        /* 尺寸选择器 */
        .qrcode-size-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .qrcode-size-selector .size-label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .size-btn {
            width: auto !important;
            height: 32px;
            padding: 0 13px;
            border-radius: 18px;
            border: 1.5px solid #d0d8e0;
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all var(--transition);
            font-family: inherit;
            letter-spacing: 0.03em;
            white-space: nowrap;
            margin-bottom: 0 !important;
            box-shadow: var(--shadow-sm);
        }

        .size-btn:hover {
            border-color: #a0b8d0;
            background: #f5f8fb;
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .size-btn.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.2);
        }

        /* 二维码画布容器 */
        #qrcodeImage {
            display: inline-block;
            text-align: center;
            padding: 8px;
            margin: 0 auto 10px;
            line-height: 0;
        }

        #qrcodeImage canvas {
            border: 2px solid #e0e4e8;
            border-radius: var(--radius-lg);
            padding: 8px;
            background: #fff;
            box-shadow: var(--shadow-sm);
            transition: all var(--transition);
        }

        .qrcode-instructions {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 0.02em;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .status-parked {
            background-color: #d4edda;
            color: #155724;
        }

        .status-out {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .status-no-record {
            background-color: #f8d7da;
            color: #721c24;
        }

        .debug-info {
            margin-top: 10px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: var(--radius-sm);
            font-size: 12px;
            color: var(--text-muted);
        }

        .real-time-indicator {
            background-color: #ffc107;
            color: #856404;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 28px;
            font-size: 0.88rem;
            font-weight: 500;
            letter-spacing: 0.03em;
            z-index: 1000;
            pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success-toast {
            background: #059669;
        }

        .toast.warning-toast {
            background: #eab308;
            color: #1a1a2e;
        }

        /* 响应式设计 */
        @media (max-width: 640px) {
            .container {
                padding: 18px 14px 16px;
                border-radius: var(--radius-lg);
            }

            h1 {
                font-size: 22px;
                margin-bottom: 20px;
            }

            input[type="text"],
            input[type="number"] {
                padding: 12px;
                font-size: 15px;
                border-radius: var(--radius-sm);
            }

            button {
                padding: 13px;
                font-size: 16px;
                border-radius: var(--radius-sm);
            }

            .timer-control-panel {
                flex-direction: column;
                gap: 10px;
                padding: 14px;
            }

            .timer-control-panel .control-group {
                min-width: 100%;
            }

            .timer-btn {
                width: 100% !important;
                height: 40px;
                font-size: 0.85rem;
            }

            .timer-status {
                margin-left: 0;
                justify-content: center;
                width: 100%;
            }

            .size-btn {
                height: 28px;
                padding: 0 10px;
                font-size: 0.74rem;
                border-radius: 14px;
            }

            #qrcodeImage canvas {
                padding: 4px;
                border-radius: var(--radius);
            }

            .qrcode-container {
                padding: 14px 8px 10px;
                border-radius: var(--radius);
            }

            .qrcode-title {
                font-size: 16px;
            }

            .toast {
                font-size: 0.78rem;
                padding: 10px 18px;
                border-radius: 22px;
                top: 16px;
            }
        }

        @media (max-width: 380px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 14px 10px 12px;
            }

            h1 {
                font-size: 18px;
            }

            .size-btn {
                height: 26px;
                padding: 0 8px;
                font-size: 0.7rem;
            }

            #qrcodeImage canvas {
                max-width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Toast 提示 -->
    <div class="toast" id="toast" aria-live="polite"></div>

    <div class="container">
        <h1>🚗 停车状态查询及离场系统</h1>

        <!-- 车牌输入表单 -->
        <form id="parkingForm">
            <div class="form-group">
                <label for="carno">请输入车牌号：</label>
                <input type="text" id="carno" placeholder="例如：陕AFF7290" value="陕AFF7290" required maxlength="10">
            </div>
            <button type="submit" id="queryBtn">🔍 查询停车状态</button>
        </form>

        <!-- 定时查询控制面板 -->
        <div class="timer-control-panel" id="timerControlPanel">
            <div class="control-group">
                <label for="intervalMinutes">查询间隔</label>
                <div class="input-suffix">
                    <input type="number" id="intervalMinutes" value="5" min="1" max="1440" step="1">
                </div>
            </div>
            <div class="control-group">
                <label for="overtimeMinutes">超时提醒</label>
                <div class="input-suffix">
                    <input type="number" id="overtimeMinutes" value="30" min="1" max="1440" step="1">
                </div>
            </div>
            <div class="control-group">
                <label for="wxUid">接收人UID</label>
                <input type="text" id="wxUid" placeholder="UID_xxxxxxxxxxxxx" value="">
            </div>
            <button class="timer-btn timer-btn-start" id="startTimerBtn" type="button">▶ 开始定时查询</button>
            <button class="timer-btn timer-btn-stop" id="stopTimerBtn" type="button" style="display:none;">⏹ 停止定时查询</button>
            <div class="timer-status stopped" id="timerStatus">
                <span class="status-dot"></span>
                <span id="timerStatusText">定时查询已停止</span>
            </div>
            <div class="countdown-info" id="countdownInfo" style="display:none;"></div>
        </div>

        <!-- 超时提醒区域 -->
        <div class="overtime-alert" id="overtimeAlert">
            <div class="alert-title">⏰ 停车超时提醒</div>
            <div class="alert-detail" id="overtimeAlertDetail"></div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在查询停车信息，请稍候...</p>
        </div>

        <div class="result" id="result"></div>

        <button class="leave-btn" id="leaveBtn" style="display: none;">🚪 生成离场二维码</button>

        <div class="qrcode-container" id="qrcodeContainer">
            <h3 class="qrcode-title">📱 离场二维码</h3>
            <!-- 尺寸选择器 -->
            <div class="qrcode-size-selector" id="qrcodeSizeSelector">
                <span class="size-label">尺寸：</span>
                <button class="size-btn" data-size="200" type="button">小</button>
                <button class="size-btn active" data-size="250" type="button">中</button>
                <button class="size-btn" data-size="300" type="button">大</button>
            </div>
            <!-- 二维码画布容器 -->
            <div id="qrcodeImage"></div>
            <p class="qrcode-instructions">请使用微信扫描上方二维码完成离场操作</p>
        </div>
    </div>

    <script>
        (function() {
            // ============ WxPusher 配置 ============
            // ⚠️ 请将下面替换为您的真实 appToken（在 WxPusher 后台获取，以 AT_ 开头）
            const WXPUSHER_APP_TOKEN = 'AT_t92uVxSkowRo3GY5zUAIxCcCjBvDRTJe';

            // ============ DOM 元素 ============
            const carnoInput = document.getElementById('carno');
            const queryBtn = document.getElementById('queryBtn');
            const loadingEl = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            const leaveBtn = document.getElementById('leaveBtn');
            const qrcodeContainer = document.getElementById('qrcodeContainer');
            const qrcodeImageDiv = document.getElementById('qrcodeImage');
            const sizeSelector = document.getElementById('qrcodeSizeSelector');
            const sizeBtns = sizeSelector.querySelectorAll('.size-btn');
            const toast = document.getElementById('toast');

            // 定时相关DOM
            const intervalMinutesInput = document.getElementById('intervalMinutes');
            const overtimeMinutesInput = document.getElementById('overtimeMinutes');
            const wxUidInput = document.getElementById('wxUid');
            const startTimerBtn = document.getElementById('startTimerBtn');
            const stopTimerBtn = document.getElementById('stopTimerBtn');
            const timerStatus = document.getElementById('timerStatus');
            const timerStatusText = document.getElementById('timerStatusText');
            const countdownInfo = document.getElementById('countdownInfo');
            const overtimeAlert = document.getElementById('overtimeAlert');
            const overtimeAlertDetail = document.getElementById('overtimeAlertDetail');

            // ============ 状态变量 ============
            let currentParkingInfo = null;
            let currentLeaveUrl = '';
            let currentQRSize = 250;
            let qrInstance = null;
            let toastTimer = null;

            // 定时器相关状态
            let timerIntervalId = null;
            let isTimerRunning = false;
            let intervalMinutes = 5;
            let overtimeMinutes = 30;
            let countdownSeconds = 0;
            let countdownTimerId = null;
            let parkingStartTime = null;

            // ============ Toast 提示 ============
            function showToast(message, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2200);
            }

            // ============ WxPusher 核心推送函数 ============
            async function sendWxPusherMessage(uid, content) {
                // 基础校验
                if (!WXPUSHER_APP_TOKEN || !WXPUSHER_APP_TOKEN.startsWith('AT_')) {
                    console.error('appToken 未配置或格式错误，请在代码中设置 WXPUSHER_APP_TOKEN');
                    return { success: false, error: 'appToken 未配置' };
                }
                if (!uid || !uid.startsWith('UID_')) {
                    console.error('UID 格式错误，应该以 UID_ 开头');
                    return { success: false, error: 'UID 格式错误' };
                }
                if (!content || content.trim().length === 0) {
                    console.error('消息内容不能为空');
                    return { success: false, error: '消息内容为空' };
                }

                const url = 'https://wxpusher.zjiecode.com/api/send/message';

                const requestBody = {
                    appToken: WXPUSHER_APP_TOKEN,
                    content: content,
                    summary: '停车超时提醒',
                    contentType: 3, // 3 = Markdown
                    uids: [uid]
                };

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    let result;
                    const responseText = await response.text();
                    try {
                        result = JSON.parse(responseText);
                    } catch (e) {
                        throw new Error(`服务器响应异常: ${responseText.substring(0, 100)}`);
                    }

                    if (result.code === 1000) {
                        console.log('✅ 微信提醒发送成功');
                        return { success: true, data: result };
                    } else {
                        let errorMsg = result.msg || result.message || '未知错误';
                        throw new Error(`发送失败 [${result.code}]: ${errorMsg}`);
                    }
                } catch (err) {
                    console.error('微信提醒发送异常:', err);
                    return { success: false, error: err.message };
                }
            }

            // ============ 构建超时提醒消息 ============
            function buildOvertimeMessage(elapsedMinutes, parkingInfo) {
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const timeStr = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;              
                const plateNumber = parkingInfo?.carno || carnoInput.value.trim() || '未知';
                const parkName = parkingInfo?.parkname || '未知停车场';
                const intime = parkingInfo?.intime || '未知';
                const parktimestr = parkingInfo?.parktimestr || `${elapsedMinutes}分钟`;

                return `### ⚠️ 停车超时提醒\n\n您的车辆已停放**超过${elapsedMinutes}分钟**，请及时处理。\n\n- 🚗 车牌号：**${plateNumber}**\n- 📍 停车位置：${parkName}\n- 🕐 入场时间：${intime}\n- ⏱ 已停时长：${parktimestr}\n- ⏰ 提醒时间：${timeStr}\n\n> 请尽快处理离场，避免产生额外费用。`;
            }

            // ============ 超时触发回调 ============
            async function onOvertimeTriggered(elapsedMinutes) {
                console.log(`[超时回调] 停车已超时，当前停放时长：${elapsedMinutes} 分钟，超时阈值：${overtimeMinutes} 分钟`);

                const wxUid = wxUidInput.value.trim();
                if (!wxUid) {
                    console.warn('[超时回调] 未填写接收人UID，跳过微信提醒');
                    return;
                }

                const messageContent = buildOvertimeMessage(elapsedMinutes, currentParkingInfo);

                const result = await sendWxPusherMessage(wxUid, messageContent);
                if (result.success) {
                    showToast('✅ 超时提醒已发送到微信', 'success-toast');
                    console.log('✅ 超时微信提醒发送成功');
                } else {
                    console.error('❌ 超时微信提醒发送失败:', result.error);
                    showToast('⚠️ 超时提醒发送失败: ' + (result.error || '未知错误'), 'warning-toast');
                }
            }
          
                // ============ 检查超时状态 ============

            function checkOvertimeStatus() {
                if (!parkingStartTime || !isTimerRunning) {
                    overtimeAlert.classList.remove('visible');
                    return;
                }

                const now = new Date();
                const elapsedMs = now.getTime() - parkingStartTime.getTime();
                const elapsedMinutes = Math.floor(elapsedMs / (1000 * 60));

                if (elapsedMinutes >= overtimeMinutes) {
                    overtimeAlert.classList.add('visible');
                    overtimeAlertDetail.textContent =
                        `车辆已停放 ${elapsedMinutes} 分钟，超过设定的超时提醒时间（${overtimeMinutes} 分钟）。`;
                    onOvertimeTriggered(elapsedMinutes);

                    overtimeAlert.classList.remove('visible');

            // ============ 构建离场URL ============
            function buildLeaveUrl(parkingInfo) {

            // ============ 渲染二维码 ============
            function renderQRCode(url, size) {
                qrcodeImageDiv.innerHTML = '';

                try {

                    });

            // ============ 判断是否为实时停车 ============
            function isRealTimeParking(parkingRecord) {
                const now = new Date();
                let intime = null;
                let outtime = null;

                if (parkingRecord.intime) {
                    intime = new Date(parkingRecord.intime);
                }
                if (parkingRecord.outtime) {
                    outtime = new Date(parkingRecord.outtime);
                }

                if (intime) {
                    if (!outtime) {
                        return { isRealTime: true, reason: '无出场时间', intime: intime };
                    }
                    const timeDiff = Math.abs(now.getTime() - outtime.getTime());
                    const timeDiffMinutes = Math.floor(timeDiff / (1000 * 60));
                    if (timeDiffMinutes < 5) {
                        return { isRealTime: true, reason: `出场时间为系统时间(${timeDiffMinutes}分钟内)`,
                            intime: intime };
                    }
                    if (outtime < intime) {
                        return { isRealTime: true, reason: '出场时间早于入场时间', intime: intime };
                    }
                    return { isRealTime: false, reason: '有效出场时间', intime: intime };
                }
                return { isRealTime: false, reason: '无入场时间', intime: null };
            }

                const seconds = countdownSeconds % 60;
                countdownInfo.style.display = 'block';
                countdownInfo.textContent =
                    `⏱ 下次查询倒计时：${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }

            // ============ 隐藏二维码容器 ============
            function hideQRCodeContainer() {
                qrcodeContainer.style.display = 'none';
                qrcodeImageDiv.innerHTML = '';
                qrInstance = null;
                currentLeaveUrl = '';
            }

            function showQRCodeContainer(url) {
                currentLeaveUrl = url;
                qrcodeContainer.style.display = 'block';
                qrcodeContainer.style.animation = 'none';
                void qrcodeContainer.offsetWidth;
                qrcodeContainer.style.animation = 'fadeInUp 0.5s ease-out';
                renderQRCode(url, currentQRSize);

                    qrcodeContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            }

            // ============ 定时器控制 ============
            function startTimer() {
                if (isTimerRunning) return;

                intervalMinutes = parseInt(intervalMinutesInput.value, 10);
                overtimeMinutes = parseInt(overtimeMinutesInput.value, 10);

                if (isNaN(intervalMinutes) || intervalMinutes < 1 || intervalMinutes > 1440) {
                    showToast('查询间隔请设置在 1-1440 分钟之间', 'warning-toast');
                    intervalMinutesInput.value = 5;
                    intervalMinutes = 5;
                    return;
                }
                if (isNaN(overtimeMinutes) || overtimeMinutes < 1 || overtimeMinutes > 1440) {
                    showToast('超时提醒请设置在 1-1440 分钟之间', 'warning-toast');
                    overtimeMinutesInput.value = 30;
                    overtimeMinutes = 30;
                    return;
                }

                const carno = carnoInput.value.trim();
                if (!carno) {
                    showToast('请先输入车牌号再开始定时查询', 'warning-toast');
                    return;
                }

                // 检查UID是否填写（可选，但提醒需要）
                const wxUid = wxUidInput.value.trim();
                if (wxUid && !wxUid.startsWith('UID_')) {
                    showToast('接收人UID格式错误，应以 UID_ 开头', 'warning-toast');
                    return;
                }
                // 保存UID到本地
                if (wxUid) {
                    localStorage.setItem('wxpusher_uid', wxUid);
                }

                isTimerRunning = true;
                countdownSeconds = intervalMinutes * 60;

                startTimerBtn.style.display = 'none';
                stopTimerBtn.style.display = 'inline-block';
                timerStatus.className = 'timer-status running';
                timerStatusText.textContent = `定时查询运行中（每${intervalMinutes}分钟）`;
                countdownInfo.style.display = 'block';
                intervalMinutesInput.disabled = true;
                overtimeMinutesInput.disabled = true;
                wxUidInput.disabled = true;

                performQuery(true);

                timerIntervalId = setInterval(() => {
                    performQuery(true);
                }, intervalMinutes * 60 * 1000);

                countdownTimerId = setInterval(() => {
                    updateCountdownDisplay();                
                }, 1000);

                updateCountdownDisplay();
                showToast(`✅ 定时查询已启动，每${intervalMinutes}分钟查询一次`, 'success-toast');
                console.log(
                    `定时查询已启动 - 间隔：${intervalMinutes}分钟，超时提醒：${overtimeMinutes}分钟，UID：${wxUid || '未填写'}`
                );
            }

            function stopTimer() {
                if (!isTimerRunning) return;

                isTimerRunning = false;

                if (timerIntervalId) {
                    clearInterval(timerIntervalId);
                    timerIntervalId = null;
                }
                if (countdownTimerId) {
                    clearInterval(countdownTimerId);
                    countdownTimerId = null;
                }

                countdownSeconds = 0;
                parkingStartTime = null;
                overtimeAlert.classList.remove('visible');

                startTimerBtn.style.display = 'inline-block';
                stopTimerBtn.style.display = 'none';
                timerStatus.className = 'timer-status stopped';
                timerStatusText.textContent = '定时查询已停止';
                countdownInfo.style.display = 'none';
                intervalMinutesInput.disabled = false;
                overtimeMinutesInput.disabled = false;
                wxUidInput.disabled = false;

                showToast('⏹ 定时查询已停止', 'warning-toast');
                console.log('定时查询已停止');
            }

                if (savedUid) {

            // ============ 事件监听 ============
            document.getElementById('parkingForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                if (isTimerRunning) {
                    stopTimer();

                parkingStartTime = null;

                await performQuery(false);

                    showToast('请先查询停车信息', 'warning-toast');

                const realTimeCheck = isRealTimeParking(currentParkingInfo);

                if (!realTimeCheck.isRealTime) {
                    showToast('车辆已出场，无法生成离场二维码', 'warning-toast');
                    console.log('原因: ' + realTimeCheck.reason);
                    return;
                }

                const leaveUrl = buildLeaveUrl(currentParkingInfo);
                showQRCodeContainer(leaveUrl);

                sizeBtns.forEach(b => b.classList.remove('active'));
                const defaultSizeBtn = sizeSelector.querySelector('[data-size="250"]');
                if (defaultSizeBtn) {
                    defaultSizeBtn.classList.add('active');
                }
                currentQRSize = 250;
                renderQRCode(leaveUrl, currentQRSize);

                showToast('✅ 离场二维码已生成', 'success-toast');
            });

            sizeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const newSize = parseInt(this.getAttribute('data-size'), 10);
                    if (newSize === currentQRSize) return;

                    sizeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    currentQRSize = newSize;
                    if (currentLeaveUrl) {
                        renderQRCode(currentLeaveUrl, currentQRSize);
                    }
                });
            });

            overtimeMinutesInput.addEventListener('change', function() {
                overtimeMinutes = parseInt(this.value, 10) || 30;
                if (overtimeMinutes < 1) overtimeMinutes = 1;
                if (overtimeMinutes > 1440) overtimeMinutes = 1440;
                this.value = overtimeMinutes;
                if (isTimerRunning) {
                    checkOvertimeStatus();
                }
            });

            intervalMinutesInput.addEventListener('change', function() {
                intervalMinutes = parseInt(this.value, 10) || 5;
                if (intervalMinutes < 1) intervalMinutes = 1;
                if (intervalMinutes > 1440) intervalMinutes = 1440;
                this.value = intervalMinutes;
            });

            // ============ 初始化 ============
            function init() {
                loadStoredUid();
                if (typeof QRCode === 'undefined') {
                    console.error('QRCode库加载失败，请检查网络连接');
                    showToast('二维码库加载失败，请刷新页面', 'warning-toast');
                    return;
                }
                console.log('✅ QRCode库已就绪');
                console.log('✅ WxPusher 配置状态：', WXPUSHER_APP_TOKEN.startsWith('AT_') ? 'appToken已设置' :
                    '⚠️ appToken未配置，请在代码中设置');
            }

            init();

            // 页面加载完成后自动查询
            window.onload = function() {
                document.getElementById('parkingForm').dispatchEvent(new Event('submit'));
            };

            // ============ 暴露API到全局 ============
            window._parkingQR = {
                getState: () => ({
                    currentParkingInfo,
                    currentLeaveUrl,
                    currentQRSize,
                    hasQR: !!qrInstance,
                    isTimerRunning,
                    intervalMinutes,
                    overtimeMinutes,
                    parkingStartTime,
                    countdownSeconds,
                    wxUid: wxUidInput.value,
                }),
                startTimer,
                stopTimer,
                performQuery: () => performQuery(false),
                sendTestWxMessage: async () => {
                    const wxUid = wxUidInput.value.trim();
                    if (!wxUid) {
                        showToast('请先填写接收人UID', 'warning-toast');
                        return;
                    }
                    const result = await sendWxPusherMessage(wxUid, '### 🧪 测试消息\n\n这是一条来自停车系统的测试提醒。\n\n配置正确即可收到此消息。');
                    if (result.success) {
                        showToast('✅ 测试消息发送成功', 'success-toast');
                    } else {
                        showToast('❌ 发送失败: ' + (result.error || '未知错误'), 'warning-toast');
                    }
                },
                regenerateQR: () => {
                    if (currentLeaveUrl) {
                        renderQRCode(currentLeaveUrl, currentQRSize);
                    }
                },
                clearAll: () => {
                    stopTimer();
                    hideQRCodeContainer();
                    currentParkingInfo = null;
                    currentLeaveUrl = '';
                    parkingStartTime = null;
                    overtimeAlert.classList.remove('visible');
                    leaveBtn.style.display = 'none';
                    resultDiv.style.display = 'none';
                },
            };

            console.log('✅ 停车状态查询及离场系统已就绪（微信提醒版）');
            console.log('   - 定时查询，间隔可设置（分钟）');
            console.log('   - 超时自动微信提醒（WxPusher）');
            console.log('   - UID在界面开放设置，appToken在代码中配置');
            console.log('   - 二维码本地生成，支持尺寸切换');
            console.log('   - 自动检测实时停车状态');
            console.log('   - 测试微信提醒: _parkingQR.sendTestWxMessage()');
        })();
    </script>
</body>
</html>
